<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-200 font-sans min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-8">Data Pipeline Dashboard</h1>

        <div class="flex space-x-1 mb-6 border-b border-gray-700">
            <button id="tab-upload"
                class="px-4 py-2 font-semibold text-blue-400 border-b-2 border-blue-400 hover:bg-gray-800 transition focus:outline-none">Upload
                CSV</button>
            <button id="tab-history"
                class="px-4 py-2 font-semibold text-gray-400 hover:text-blue-400 hover:bg-gray-800 transition focus:outline-none">Job
                History</button>
            <button id="tab-data"
                class="px-4 py-2 font-semibold text-gray-400 hover:text-blue-400 hover:bg-gray-800 transition focus:outline-none">Clean
                Data</button>
        </div>

        <div id="view-upload" class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold text-white mb-4">Upload New Transactions</h2>
            <form id="uploadForm" class="max-w-md space-y-4">
                <input type="file" id="fileInput" accept=".csv" required
                    class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-blue-400 hover:file:bg-gray-600 transition">
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-500 transition shadow-md">Upload
                    & Process</button>
            </form>

            <div id="statusArea" class="mt-6 hidden max-w-md bg-gray-900 p-4 rounded border border-gray-700">
                <p class="font-semibold text-gray-300 mb-2">Status: <span id="statusText"
                        class="text-blue-400 capitalize">Queued</span></p>
                <p class="text-sm text-gray-400">Processed: <span id="processedCount"
                        class="font-medium text-white">0</span> / <span id="totalCount"
                        class="font-medium text-white">0</span></p>
                <p class="text-sm text-red-400 mt-1">Invalid Rows: <span id="invalidCount" class="font-medium">0</span>
                </p>
                <a id="downloadBtn" href="#"
                    class="hidden mt-3 text-center bg-red-900/50 text-red-400 border border-red-800 py-2 px-4 rounded hover:bg-red-900 transition block">⬇️
                    Download Error Report</a>
            </div>
        </div>

        <div id="view-history" class="hidden bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
            <h2 class="text-xl font-semibold text-white mb-4">Processing History</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-gray-900 text-gray-400">
                        <tr>
                            <th class="px-4 py-3 rounded-tl">Job ID</th>
                            <th class="px-4 py-3">Status</th>
                            <th class="px-4 py-3">Total Rows</th>
                            <th class="px-4 py-3 text-red-400">Invalid</th>
                            <th class="px-4 py-3">Date</th>
                            <th class="px-4 py-3 rounded-tr">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody" class="divide-y divide-gray-700">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="view-data" class="hidden bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-white">Stored Transactions</h2>
                <button id="globalExportBtn"
                    class="bg-green-600 text-white py-1 px-3 rounded text-sm hover:bg-green-500 shadow transition">
                    ⬇️ Export Filtered Data
                </button>
            </div>

            <div class="bg-gray-900 p-4 rounded border border-gray-700 mb-4 flex flex-wrap gap-4 items-end text-sm">
                <div>
                    <label class="block text-gray-400 mb-1">Filter By</label>
                    <select id="filterDateType"
                        class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 focus:outline-none focus:border-blue-500">
                        <option value="createdAt" selected>Upload Date</option>
                        <option value="date">Transaction Date</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Start Date</label>
                    <input type="date" id="filterStart"
                        class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 [color-scheme:dark] focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">End Date</label>
                    <input type="date" id="filterEnd"
                        class="bg-gray-800 border border-gray-600 text-white rounded px-2 py-1 [color-scheme:dark] focus:outline-none focus:border-blue-500">
                </div>
                <div class="ml-auto flex items-center">
                    <button id="applyFiltersBtn"
                        class="bg-blue-600 text-white py-1 px-4 rounded hover:bg-blue-500 transition shadow">Apply
                        Filters</button>
                    <button id="clearFiltersBtn"
                        class="text-gray-400 hover:text-gray-200 underline ml-3 transition">Clear</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-gray-900 text-gray-400">
                        <tr>
                            <th class="px-4 py-3 rounded-tl cursor-pointer hover:text-white transition"
                                onclick="toggleSort('date')">Transaction Date ↕️</th>
                            <th class="px-4 py-3 cursor-pointer hover:text-white transition"
                                onclick="toggleSort('createdAt')">Upload Date ↕️</th>
                            <th class="px-4 py-3">Description</th>
                            <th class="px-4 py-3">Category</th>
                            <th class="px-4 py-3 rounded-tr cursor-pointer hover:text-white transition text-right"
                                onclick="toggleSort('amount')">Amount ↕️</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-gray-700">
                    </tbody>
                </table>
            </div>

            <div class="mt-4 flex justify-between items-center text-sm text-gray-400">
                <button id="prevPageBtn"
                    class="px-3 py-1 bg-gray-700 text-white rounded hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition">Previous</button>
                <span id="pageIndicator" class="font-medium text-gray-300">Page 1</span>
                <button id="nextPageBtn"
                    class="px-3 py-1 bg-gray-700 text-white rounded hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition">Next</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
